<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Account — JC Enterprise</title>
<link rel="icon" href="/img/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="bg-scene" aria-hidden="true"><div class="bg-glow bg-glow-1"></div><div class="bg-glow bg-glow-2"></div></div>
<header class="topbar" id="app-header"></header>

<!-- Auth forms -->
<section id="auth-section" class="section wrap hidden" style="max-width:440px; padding-top:40px;">
  <div class="tabs">
    <button class="tab-btn active" data-tab="login">Sign in</button>
    <button class="tab-btn" data-tab="register">Create account</button>
  </div>
  <div class="glass" style="padding:30px;">
    <div id="tab-login" class="tab-panel active">
      <form id="login-form" class="stack-form">
        <input type="email" id="li-email" placeholder="Email" required>
        <input type="password" id="li-password" placeholder="Password" required>
        <button type="submit" class="btn btn-gold">Sign in</button>
        <p class="form-msg" id="login-msg"></p>
      </form>
    </div>
    <div id="tab-register" class="tab-panel">
      <form id="register-form" class="stack-form">
        <input type="text" id="rg-name" placeholder="Full name" required>
        <input type="email" id="rg-email" placeholder="Email" required>
        <input type="password" id="rg-password" placeholder="Password (min 6 characters)" required minlength="6">
        <label>I want to
          <select id="rg-role">
            <option value="user">Browse &amp; save properties</option>
            <option value="agent">List properties as an agent</option>
          </select>
        </label>
        <button type="submit" class="btn btn-gold">Create account</button>
        <p class="form-msg" id="register-msg"></p>
      </form>
    </div>
  </div>
</section>

<!-- User dashboard -->
<section id="dashboard-section" class="section wrap hidden">
  <div class="section-head"><h2>My account</h2></div>
  <div class="tabs">
    <button class="tab-btn active" data-utab="favorites">Favorites</button>
    <button class="tab-btn" data-utab="inspections">My inspections</button>
  </div>
  <div id="u-tab-favorites" class="u-tab-panel">
    <div id="favorites-grid" class="listings-grid"><p class="loading">Loading…</p></div>
  </div>
  <div id="u-tab-inspections" class="u-tab-panel hidden">
    <div id="inspections-list" class="table-list"><p class="loading">Loading…</p></div>
  </div>
</section>

<footer class="footer"><div id="app-footer"></div></footer>
<script src="/js/common.js"></script>
<script src="/js/account.js"></script>
</body>
</html>
